      <div class="game-grid">
        <div class="game-thumb"><div class="ico">🧠</div><div class="nm">Memory Matrix</div><div class="tm">90 secs</div></div>
        <div class="game-thumb"><div class="ico">⚡</div><div class="nm">Inventory Blitz</div><div class="tm">75 secs</div></div>
        <div class="game-thumb"><div class="ico">🔢</div><div class="nm">Pattern Recon</div><div class="tm">75 secs</div></div>
        <div class="game-thumb"><div class="ico">🎨</div><div class="nm">Stroop Test</div><div class="tm">75 secs</div></div>
        <div class="game-thumb"><div class="ico">📊</div><div class="nm">Sales War Room</div><div class="tm">25 secs</div></div>
        <div class="game-thumb"><div class="ico">📥</div><div class="nm">Inbox Meltdown</div><div class="tm">60 secs</div></div>
        <div class="game-thumb"><div class="ico">💰</div><div class="nm">Deal or No Deal</div><div class="tm">4 deals</div></div>
        <div class="game-thumb"><div class="ico">💬</div><div class="nm">DM Dash</div><div class="tm">3 exchanges</div></div>
      </div>
      <button class="btn-main" style="max-width:260px;margin:0 auto;" onclick="startGames()">Let's go →</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div class="game-topbar">
      <div style="font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;color:#6B21A8;">Highfy <span style="color:#6B21A8;">Future Talent</span> Program</div>
      <div class="topbar-prog">
        <div class="prog-meta"><span id="prog-label">Game 1 of 8</span><span id="prog-pct">0%</span></div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="timer-pill" id="timer-pill">—</div>
    </div>
    <div class="game-body">
      <div class="dept-tag" id="g-dept"></div>
      <h2 id="g-name"></h2>
      <p class="game-desc" id="g-desc"></p>
      <div class="game-area" id="game-area"></div>
    </div>
