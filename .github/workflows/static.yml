  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highfy — MT Assessment</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
  :root {
    --purple: #6B21A8;
    --purple-dark: #5B21B6;
    --orange: #F97316;
    --orange-dim: rgba(249,115,22,0.15);
    --purple-light: #7E3BB5;
    --purple-dim: rgba(107,33,168,0.12);
    --dark: #ffffff;
    --surface: #f5f5f5;
    --surface2: #ebebeb;
    --surface3: #e0e0e0;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #666;
    --success: #00c97a;
    --warning: #f59e0b;
    --danger: #ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--dark);color:var(--text);
    font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;
  }
  h1,h2,h3,h4{font-family:'Poppins',sans-serif;}

  /* grain overlay */
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.015;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .screen{display:none;min-height:100vh;position:relative;z-index:1;}
  .screen.active{display:flex;flex-direction:column;}

  /* ── LANDING ── */
  #screen-landing{
    align-items:center;justify-content:center;padding:40px 20px;
    background:radial-gradient(ellipse 90% 60% at 50% -10%,rgba(107,33,168,0.2) 0%,transparent 65%);
  }
  .landing-wrap{max-width:540px;width:100%;}
  .brand-row{display:flex;align-items:center;gap:12px;margin-bottom:40px;}
  .brand-logo{font-family:'Poppins',sans-serif;font-weight:800;font-size:28px;letter-spacing:-0.01em;}
  .brand-logo span{color:var(--purple);}
  .brand-tag{background:var(--purple-dim);border:1px solid rgba(107,33,168,0.25);padding:4px 12px;border-radius:100px;font-size:11px;color:var(--purple);font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
  .landing-wrap h1{font-size:clamp(38px,6vw,58px);font-weight:800;line-height:1.02;margin-bottom:14px;letter-spacing:-0.01em;}
  .landing-wrap h1 em{color:var(--purple);font-style:normal;}
  .landing-wrap>p{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:28px;}
  .meta-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px;}
  .chip{background:var(--surface);border:1px solid var(--border);padding:6px 14px;border-radius:100px;font-size:12px;color:var(--muted);}
  .chip b{color:var(--text);font-weight:500;}

  /* form */
  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:30px;}
  .form-card h2{font-size:18px;font-weight:700;margin-bottom:22px;}
  .frow{display:grid;gap:12px;margin-bottom:12px;}
  .frow.two{grid-template-columns:1fr 1fr;}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase;}
  .field input,.field select{
    width:100%;background:var(--surface2);border:1px solid var(--border);
    color:var(--text);padding:11px 13px;border-radius:10px;font-size:14px;
    font-family:'Nunito',sans-serif;outline:none;transition:border .2s;
  }
  .field input:focus,.field select:focus{border-color:var(--purple);}
  .field select option{background:var(--surface2);}






  .err{color:var(--danger);font-size:11px;margin-top:4px;display:none;}
  .btn-main{
    width:100%;background:var(--purple);color:#fff;border:none;padding:14px;
    border-radius:12px;font-size:15px;font-weight:700;font-family:'Poppins',sans-serif;
    cursor:pointer;margin-top:18px;transition:all .2s;letter-spacing:.02em;
  }
  .btn-main:hover{background:var(--purple-light);transform:translateY(-1px);}
  .btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .admin-link{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);}
  .admin-link a{color:var(--purple);cursor:pointer;}

  /* ── BLOCKED ── */
  #screen-blocked{
    align-items:center;justify-content:center;padding:40px 20px;
    background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(239,68,68,0.12) 0%,transparent 65%);
  }
  .blocked-card{max-width:420px;background:var(--surface);border:1px solid rgba(239,68,68,0.25);border-radius:20px;padding:48px 36px;text-align:center;}
  .blocked-icon{font-size:52px;margin-bottom:18px;}
  .blocked-card h2{font-size:24px;color:var(--danger);margin-bottom:10px;}
  .blocked-card p{color:var(--muted);font-size:14px;line-height:1.7;}

  /* ── INTRO ── */
  #screen-intro{
    align-items:center;justify-content:center;padding:40px 20px;
    background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(107,33,168,0.15) 0%,transparent 60%);
    text-align:center;
  }
  .intro-inner{max-width:600px;}
  .intro-inner h1{font-size:clamp(28px,5vw,44px);font-weight:800;margin-bottom:12px;}
  .intro-inner>p{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:28px;}
  .game-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:32px;}
  .game-thumb{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;}
  .game-thumb .ico{font-size:22px;margin-bottom:5px;}
  .game-thumb .nm{font-size:10px;font-weight:600;color:var(--text);}
  .game-thumb .tm{font-size:9px;color:var(--muted);margin-top:2px;}

  /* ── GAME SCREEN ── */
  #screen-game{padding:0;background:var(--dark);}
  .game-topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:10;
  }
  .topbar-logo{font-family:'Poppins',sans-serif;font-weight:800;font-size:17px;}
  .topbar-logo span{color:var(--purple);}
  .topbar-prog{flex:1;max-width:280px;margin:0 16px;}
  .prog-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
  .prog-bar{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--purple);transition:width .5s ease;}
  .timer-pill{
    background:var(--surface2);border:1px solid var(--border);
    padding:5px 13px;border-radius:100px;font-size:13px;font-weight:700;
    min-width:52px;text-align:center;transition:color .3s,border-color .3s;
  }
  .timer-pill.hot{color:var(--danger);border-color:rgba(239,68,68,0.35);animation:throb 1s infinite;}
  @keyframes throb{0%,100%{opacity:1}50%{opacity:.55}}

  .game-body{padding:28px 24px;max-width:760px;margin:0 auto;min-height:calc(100vh - 56px);display:flex;flex-direction:column;}
  .dept-tag{font-size:10px;color:var(--purple);letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:5px;}
  .game-body h2{font-size:clamp(20px,4vw,30px);font-weight:800;margin-bottom:6px;}
  .game-body .game-desc{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:24px;}
  .game-area{flex:1;display:flex;flex-direction:column;}

  /* shared game components */
  .fade-in{animation:fi .35s ease;}

  /* TUTORIAL OVERLAY */
  .tutorial-overlay {
    position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .tutorial-card {
    background:#fff;border-radius:20px;padding:36px;max-width:480px;width:100%;text-align:center;
  }
  .tutorial-card .t-icon {font-size:52px;margin-bottom:16px;}
  .tutorial-card h2 {font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:#1a1a1a;margin-bottom:10px;}
  .tutorial-card p {font-size:14px;color:#555;line-height:1.7;margin-bottom:20px;}
  .tutorial-card .t-tip {background:#f5f0ff;border-radius:10px;padding:12px;font-size:13px;color:#6B21A8;margin-bottom:20px;font-weight:500;}
  .tutorial-timer {font-size:13px;color:#999;margin-bottom:16px;}
  .tutorial-timer span {font-weight:700;color:#6B21A8;}
  .btn-start-game {background:#6B21A8;color:#fff;border:none;padding:13px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}

  @keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* MEMORY */
  .m-round{text-align:center;margin-bottom:16px;}
  .m-round span{background:var(--surface2);padding:3px 14px;border-radius:100px;font-size:11px;color:var(--muted);}
  .m-grid{display:grid;gap:6px;margin:0 auto;width:fit-content;}
  .m-cell{
    width:58px;height:58px;border-radius:9px;cursor:pointer;
    background:var(--surface2);border:1.5px solid var(--border);transition:all .12s;user-select:none;
  }
  .m-cell.lit{background:var(--purple);border-color:var(--purple);box-shadow:0 0 18px rgba(107,33,168,.45);}
  .m-cell.sel{background:rgba(107,33,168,.4);border-color:var(--purple);}
  .m-cell.ok{background:var(--success);border-color:var(--success);}
  .m-cell.no{background:var(--danger);border-color:var(--danger);}
  .m-cell.locked{cursor:default;}
  .m-status{text-align:center;margin-top:14px;font-size:14px;color:var(--muted);min-height:22px;}

  /* MATH */
  .math-scoreboard{display:flex;gap:10px;margin-bottom:18px;}
  .math-sc{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
  .math-sc .v{font-size:26px;font-weight:800;font-family:'Poppins',sans-serif;}
  .math-sc .l{font-size:10px;color:var(--muted);margin-top:1px;}
  .eq-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px;text-align:center;margin-bottom:20px;}
  .eq-box .eq{font-size:clamp(32px,6vw,58px);font-family:'Poppins',sans-serif;font-weight:800;}
  .math-row{display:flex;gap:8px;}
  .math-inp{
    flex:1;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);
    padding:14px;border-radius:12px;font-size:22px;font-family:'Poppins',sans-serif;
    font-weight:700;outline:none;text-align:center;transition:border .2s;
  }
  .math-inp:focus{border-color:var(--purple);}
  .btn-go{
    background:var(--purple);color:#fff;border:none;padding:14px 24px;
    border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;
  }

  /* PATTERN */
  .pat-qn{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;}
  .pat-seq{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
  .pat-num{
    width:56px;height:56px;background:var(--surface);border:1.5px solid var(--border);
    border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:22px;font-family:'Poppins',sans-serif;font-weight:800;
  }
  .pat-num.q{color:var(--purple);border-color:rgba(107,33,168,.4);background:var(--purple-dim);}
  .pat-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .pat-opt{
    background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;
    padding:16px;text-align:center;font-size:20px;font-family:'Poppins',sans-serif;
    font-weight:800;cursor:pointer;transition:all .12s;
  }
  .pat-opt:hover{border-color:var(--purple);background:var(--purple-dim);}
  .pat-opt.ok{background:rgba(0,201,122,.15);border-color:var(--success);color:var(--success);}
  .pat-opt.no{background:rgba(239,68,68,.12);border-color:var(--danger);color:var(--danger);}

  /* STROOP */
  .stroop-stats{display:flex;justify-content:center;gap:28px;margin-bottom:14px;}
  .s-stat .v{font-size:26px;font-weight:800;font-family:'Poppins',sans-serif;text-align:center;}
  .s-stat .l{font-size:10px;color:var(--muted);text-align:center;}
  .s-prog{height:5px;background:var(--surface2);border-radius:3px;margin-bottom:20px;overflow:hidden;}
  .s-fill{height:100%;background:var(--purple);transition:width .25s;}
  .stroop-word{font-size:clamp(48px,8vw,72px);font-family:'Poppins',sans-serif;font-weight:800;text-align:center;margin:16px 0 8px;}
  .stroop-q{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px;}
  .stroop-instr{font-size:12px;color:var(--muted);text-align:center;margin-bottom:4px;}
  .stroop-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .s-btn{
    padding:16px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;
    font-size:15px;font-weight:700;font-family:'Poppins',sans-serif;transition:all .12s;
    background:var(--surface2);color:var(--text);
  }
  .s-btn:hover{transform:scale(1.02);}
  .s-btn.ok{background:rgba(0,201,122,.15);border-color:var(--success);}
  .s-btn.no{background:rgba(239,68,68,.12);border-color:var(--danger);}

  /* WAR ROOM */
  .chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
  .bars{display:flex;align-items:flex-end;gap:6px;height:100px;min-height:100px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100px;justify-content:flex-end;}
  .bar-el{width:100%;border-radius:4px 4px 0 0;min-height:4px;}
  .bar-lbl{font-size:9px;color:var(--muted);}
  .war-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .wm{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;}
  .wm .wl{font-size:10px;color:var(--muted);margin-bottom:3px;}
  .wm .wv{font-size:20px;font-weight:800;font-family:'Poppins',sans-serif;}
  .wm .wc{font-size:10px;margin-top:2px;}
  .wc.dn{color:var(--danger);}
  .wc.up{color:var(--success);}
  .war-q{background:var(--purple-dim);border:1px solid rgba(107,33,168,.2);border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px;}
  .war-opts{display:grid;gap:7px;}
  .war-opt{
    background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;
    padding:12px 16px;cursor:pointer;font-size:13px;transition:all .12s;text-align:left;
  }
  .war-opt:hover{border-color:var(--purple);background:var(--purple-dim);}
  .war-opt.ok{border-color:var(--success);background:rgba(0,201,122,.1);}
  .war-opt.no{border-color:var(--danger);background:rgba(239,68,68,.1);}

  /* INBOX */
  .inbox-instr{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .inbox-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .inbox-item{
    background:var(--surface);border:1.5px solid var(--border);border-radius:11px;
    padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:grab;
    transition:all .12s;user-select:none;
  }
  .inbox-item:active{cursor:grabbing;opacity:.75;}
  .inbox-item.dragging{opacity:.45;}
  .inbox-item.over{border-color:var(--purple);background:var(--purple-dim);}
  .inbox-rank{
    width:26px;height:26px;border-radius:7px;background:var(--purple);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;font-family:'Poppins',sans-serif;flex-shrink:0;
  }
  .inbox-ico{font-size:18px;flex-shrink:0;}
  .inbox-txt{flex:1;}
  .inbox-txt .from{font-size:10px;color:var(--muted);}
  .inbox-txt .subj{font-size:13px;font-weight:500;}
  .inbox-txt .prev{font-size:10px;color:var(--muted);}
  .urg{font-size:9px;padding:3px 8px;border-radius:100px;font-weight:700;flex-shrink:0;}
  .urg-critical{background:rgba(239,68,68,.15);color:var(--danger);}
  .urg-high{background:rgba(245,158,11,.15);color:var(--warning);}
  .urg-medium{background:rgba(107,33,168,.15);color:var(--purple);}
  .urg-low{background:var(--surface2);color:var(--muted);}
  .btn-confirm{background:var(--purple);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}

  /* DEAL */
  .deal-ctr{text-align:center;font-size:11px;color:var(--muted);margin-bottom:14px;}
  .deal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
  .deal-card h3{font-size:12px;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em;}
  .deal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .deal-m{background:var(--surface2);border-radius:9px;padding:12px;}
  .deal-m .dl{font-size:10px;color:var(--muted);margin-bottom:3px;}
  .deal-m .dv{font-size:18px;font-weight:800;font-family:'Poppins',sans-serif;}
  .deal-m .ds{font-size:9px;color:var(--muted);margin-top:1px;}
  .deal-acts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .deal-btn{
    padding:14px 10px;border-radius:11px;border:1.5px solid var(--border);
    cursor:pointer;font-size:13px;font-weight:700;font-family:'Poppins',sans-serif;
    transition:all .18s;background:var(--surface2);color:var(--text);text-align:center;
  }
  .deal-btn:hover{transform:translateY(-2px);}
  .deal-btn.accept:hover{background:rgba(0,201,122,.15);border-color:var(--success);color:var(--success);}
  .deal-btn.negotiate:hover{background:rgba(245,158,11,.15);border-color:var(--warning);color:var(--warning);}
  .deal-btn.reject:hover{background:rgba(239,68,68,.12);border-color:var(--danger);color:var(--danger);}
  .deal-btn.ok{background:rgba(0,201,122,.15);border-color:var(--success);color:var(--success);}
  .deal-btn.no{background:rgba(239,68,68,.12);border-color:var(--danger);color:var(--danger);}
  .deal-res{text-align:center;padding:13px;border-radius:10px;margin-top:12px;font-size:13px;display:none;}
  .deal-res.profit{background:rgba(0,201,122,.1);color:var(--success);}
  .deal-res.loss{background:rgba(239,68,68,.1);color:var(--danger);}

  /* DM DASH */
  .dm-meters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .dm-m{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;}
  .dm-m .dl{font-size:10px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;}
  .dm-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .dm-fill{height:100%;border-radius:3px;transition:width .4s;}
  .dm-thread{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:14px;margin-bottom:14px;max-height:240px;overflow-y:auto;
    display:flex;flex-direction:column;gap:8px;
  }
  .dm-bub{display:flex;gap:7px;}
  .dm-bub.theirs{flex-direction:row;}
  .dm-bub.ours{flex-direction:row-reverse;}
  .dm-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--surface2);}
  .dm-txt{max-width:75%;padding:9px 13px;border-radius:13px;font-size:12px;line-height:1.5;}
  .dm-bub.theirs .dm-txt{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:3px;}
  .dm-bub.ours .dm-txt{background:var(--purple);color:#fff;border-top-right-radius:3px;}
  .dm-opts{display:grid;gap:7px;}
  .dm-opt{
    background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;
    padding:11px 14px;cursor:pointer;font-size:12px;transition:all .12s;line-height:1.4;
  }
  .dm-opt:hover{border-color:var(--purple);background:var(--purple-dim);}

  /* RESULTS */
  #screen-results{
