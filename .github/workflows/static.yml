  <script>
  // ══ SUPABASE ══
  const SUPABASE_URL = 'https://borqsxznbnbvszmmcewk.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_SiZixS18YWEOiLif8yyVYw_MaSPvnmf';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMIN_PW = 'highfy2026';
  const TABLE = 'candidates';

  // ══ STATE ══
  let candidate = {};
  let scores = { memory:0, math:0, pattern:0, stroop:0, warroom:0, inbox:0, deal:0, dm:0 };
  let gameIndex = 0;
  let timerInterval = null;

  // ══ SCREENS ══
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  // ══ ERP FORMAT ══
  // ERP field - no special formatting needed

  // ══ GPA ══
  // No file upload needed

  // ══ REGISTRATION ══
  async function submitReg() {
    const name = document.getElementById('inp-name').value.trim();
    const erp = document.getElementById('inp-erp').value.trim();
    const email = document.getElementById('inp-email').value.trim();
    const phone = document.getElementById('inp-phone').value.trim();
    const program = document.getElementById('inp-program').value;
    const gpa = parseFloat(document.getElementById('inp-gpa').value);
    if(!name||!erp||!email||!phone||!program) { alert('Please fill in all required fields.'); return; }
    if(isNaN(gpa)||gpa<0||gpa>4) { document.getElementById('err-gpa').style.display='block'; return; }
    document.getElementById('err-gpa').style.display='none';
    if(!/^\d+$/.test(erp) && erp.length >= 3) { document.getElementById('err-erp').style.display='block'; return; }
    document.getElementById('err-erp').style.display='none';

    const btn = document.getElementById('btn-start');
    btn.disabled = true; btn.textContent = 'Checking...';

    try {
      // Check duplicate ERP in Supabase
      const { data, error } = await db.from(TABLE).select('id').eq('erp', erp).limit(1);
      if(error) throw error;
      if(data && data.length > 0) { showScreen('screen-blocked'); return; }
      candidate = { name, erp, email, phone, program, gpa, date: new Date().toLocaleString() };
      // Save placeholder immediately to block duplicate attempts
      await db.from(TABLE).insert({
        name: name, erp: erp, email: email, phone: phone, program: program, gpa: gpa,
        total_score: 0, profile: 'In Progress', submitted_at: new Date().toISOString()
      });
      showScreen('screen-intro');
    } catch(e) {
      console.error(e);
      alert('Connection error. Please check your internet and try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Begin Assessment →';
    }
  }


  // ══ TUTORIALS ══
  const TUTORIALS = {
    memory:  { icon:'🧠', title:'Memory Matrix', tip:"Look carefully at which cells light up — you'll need to click them from memory!", time:12 },
    math:    { icon:'⚡', title:'Inventory Blitz', tip:"Type your answer and hit Enter or → as fast as you can. Every correct answer counts!", time:10 },
    pattern: { icon:'🔢', title:'Pattern Recognition', tip:"Study the number sequence and find the rule. Pick the missing number before time runs out!", time:10 },
    stroop:  { icon:'🎨', title:'Stroop Test', tip:"Ignore what the word SAYS — click the colour of the INK. Your brain will try to trick you!", time:12 },
    warroom: { icon:'📊', title:'Sales War Room', tip:"Read the dashboard quickly and pick the best action. You only have 25 seconds — trust your instincts!", time:12 },
    inbox:   { icon:'📥', title:'Inbox Meltdown', tip:"Drag the notifications into priority order — most urgent at the top. Think fast, the clock is ticking!", time:12 },
    deal:    { icon:'💰', title:'Deal or No Deal', tip:"Review the numbers: cost, retail price, fees, and discount. Decide whether to accept, negotiate or reject each deal!", time:12 },
    dm:      { icon:'💬', title:'DM Dash', tip:"Choose your responses carefully — each one affects the brand reputation and customer satisfaction meters!", time:12 },
  };

  function showTutorial(gameId, onStart) {
    const t = TUTORIALS[gameId];
    let countdown = t.time;
    const overlay = document.createElement('div');
    overlay.className = 'tutorial-overlay';
    overlay.innerHTML = `
      <div class="tutorial-card fade-in">
        <div class="t-icon">${t.icon}</div>
        <h2>${t.title}</h2>
        <div class="t-tip">💡 ${t.tip}</div>
        <div class="tutorial-timer">Starting in <span id="t-count">${countdown}</span> seconds</div>
        <button class="btn-start-game" onclick="this.closest('.tutorial-overlay').remove();onStartGame();">I'm Ready →</button>
      </div>`;
    document.body.appendChild(overlay);
    window.onStartGame = onStart;
    const interval = setInterval(()=>{
      countdown--;
      const el = document.getElementById('t-count');
      if(el) el.textContent = countdown;
      if(countdown <= 0) {
        clearInterval(interval);
        overlay.remove();
        onStart();
      }
    }, 1000);
  }

  // ══ GAMES CONFIG ══
  const GAMES = [
    { id:'memory',  dept:'Memory Department',       name:'Memory Matrix',    desc:'Memorise the highlighted cells, then reproduce the pattern. 3 rounds.',        timer:90   },
    { id:'math',    dept:'Operations',              name:'Inventory Blitz',  desc:'Solve as many arithmetic problems as you can in 75 seconds.',                   timer:60   },
    { id:'pattern', dept:'Analytics',               name:'Pattern Recognition', desc:'Find the missing number in each sequence. 3 questions.',                    timer:60   },
    { id:'stroop',  dept:'Brand Team',              name:'Stroop Test',      desc:'Tap the INK COLOUR of the word — not what it says. 8 rounds.',                  timer:60   },
    { id:'warroom', dept:'Sales War Room',           name:'Sales War Room',   desc:"You're the brand manager. The dashboard is flashing. Spot what's wrong — fast.", timer:25   },
    { id:'inbox',   dept:'Operations',              name:'Inbox Meltdown',   desc:"It's 9am. 5 urgent notifications just landed. Drag them into priority order.",   timer:60   },
    { id:'deal',    dept:'Buying & Merchandising',  name:'Deal or No Deal',  desc:'A supplier is pitching. Review the numbers and decide in 20 seconds each.',      timer:null },
    { id:'dm',      dept:'Customer Experience',     name:'DM Dash',          desc:'An angry customer just messaged Highfy on Instagram. Handle it.',                timer:90   },
  ];

  function startGames() { gameIndex=0; showScreen('screen-game'); launchGame(); }

  function updateProgress() {
    const pct = Math.round((gameIndex/GAMES.length)*100);
    document.getElementById('prog-fill').style.width = pct+'%';
    document.getElementById('prog-label').textContent = `Game ${gameIndex+1} of ${GAMES.length}`;
    document.getElementById('prog-pct').textContent = pct+'%';
  }

  function launchGame() {
    if(gameIndex >= GAMES.length) { finishAssessment(); return; }
    const g = GAMES[gameIndex];
    document.getElementById('g-dept').textContent = g.dept;
    document.getElementById('g-name').textContent = g.name;
    document.getElementById('g-desc').textContent = g.desc;
    updateProgress();
    clearInterval(timerInterval);
    document.getElementById('timer-pill').className = 'timer-pill';
    document.getElementById('timer-pill').textContent = g.timer ? g.timer+'s' : '—';
    const area = document.getElementById('game-area');
    area.innerHTML = '';
    area.className = 'game-area fade-in';
    void area.offsetWidth;
    switch(g.id) {
      case 'memory':  showTutorial('memory', ()=>initMemory(area));  break;
      case 'math':    showTutorial('math', ()=>initMath(area));    break;
      case 'pattern': showTutorial('pattern', ()=>initPattern(area)); break;
      case 'stroop':  showTutorial('stroop', ()=>initStroop(area));  break;
      case 'warroom': showTutorial('warroom', ()=>initWarRoom(area)); break;
      case 'inbox':   showTutorial('inbox', ()=>initInbox(area));   break;
      case 'deal':    showTutorial('deal', ()=>initDeal(area));    break;
      case 'dm':      showTutorial('dm', ()=>initDM(area));      break;
    }
  }

  function startTimer(secs, onEnd) {
    let t = secs;
    const pill = document.getElementById('timer-pill');
    pill.textContent = t+'s'; pill.className = 'timer-pill';
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      t--;
      pill.textContent = t+'s';
      if(t<=5) pill.className = 'timer-pill hot';
      if(t<=0) { clearInterval(timerInterval); onEnd(); }
    }, 1000);
  }

  function nextGame(score, key) {
    clearInterval(timerInterval);
    scores[key] = Math.max(0, Math.min(100, Math.round(score)));
    gameIndex++;
    setTimeout(launchGame, 280);
  }

  // ══ MEMORY MATRIX (3 rounds) ══
  function initMemory(area) {
    let round=0, total=0, SIZE=4, phase='show', sel=[], pat=[];
    function render() {
      area.innerHTML=`<div class="m-round"><span>Round ${round+1} of 3</span></div>
        <div class="m-grid" id="mg" style="grid-template-columns:repeat(${SIZE},58px)"></div>
        <div class="m-status" id="ms">Memorise the pattern...</div>`;
      const g=document.getElementById('mg');
      for(let i=0;i<SIZE*SIZE;i++){
        const c=document.createElement('div');
        c.className='m-cell'+(pat.includes(i)&&phase==='show'?' lit':'')+(phase==='recall'?'':' locked');
        if(phase==='recall') c.onclick=()=>toggle(i,c);
        g.appendChild(c);
      }
    }
    function toggle(i,el){
      if(sel.includes(i)){sel=sel.filter(x=>x!==i);el.classList.remove('sel');}
      else{sel.push(i);el.classList.add('sel');}
    }
    function next(){
      round++;
      if(round>=3){nextGame(total/3*100,'memory');return;}
      go();
    }
    function go(){
      const cnt=round+4; pat=[]; sel=[]; SIZE=4;
      while(pat.length<cnt){const r=Math.floor(Math.random()*16);if(!pat.includes(r))pat.push(r);}
      phase='show'; render();
      setTimeout(()=>{
        phase='recall'; render();
        document.getElementById('ms').textContent='Select the highlighted cells!';
        const b=document.createElement('button');
        b.className='btn-main';b.style='margin-top:14px;max-width:180px;';b.textContent='Submit';
        b.onclick=check; area.appendChild(b);
      },1600);
    }
    function check(){
      const ok=pat.every(p=>sel.includes(p))&&sel.every(s=>pat.includes(s));
      if(ok)total++;
      document.querySelectorAll('.m-cell').forEach((c,i)=>{
        c.onclick=null;
        if(pat.includes(i))c.classList.add('ok');
        else if(sel.includes(i))c.classList.add('no');
      });
      document.getElementById('ms').textContent=ok?'✓ Correct!':'✗ Not quite.';
      setTimeout(next,1100);
    }
    go();
  }

  // ══ INVENTORY BLITZ (60s) ══
  function initMath(area) {
    let correct=0, answered=0;
    const ops=['+','-','×'];
    function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
    function gen(){
      const op=ops[Math.floor(Math.random()*ops.length)];
      let a,b;
      if(op==='+'){a=rnd(10,99);b=rnd(10,99);}
      else if(op==='-'){a=rnd(30,99);b=rnd(10,a-1);}
      else{a=rnd(2,12);b=rnd(2,12);}
      return{a,b,op,ans:op==='+'?a+b:op==='-'?a-b:a*b};
    }
    let cur=gen();
    function render(){
      area.innerHTML=`
        <div class="math-scoreboard">
          <div class="math-sc"><div class="v" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
          <div class="math-sc"><div class="v" style="color:var(--muted)">${answered}</div><div class="l">Answered</div></div>
        </div>
        <div class="eq-box"><div class="eq">${cur.a} ${cur.op} ${cur.b} = ?</div></div>
        <div class="math-row">
          <input class="math-inp" id="mi" type="number" placeholder="?" autocomplete="off">
          <button class="btn-go" onclick="doMath()">→</button>
        </div>`;
      const i=document.getElementById('mi');
      i.focus();
      i.onkeydown=e=>{if(e.key==='Enter')doMath();};
    }
    window.doMath=function(){
      const i=document.getElementById('mi');if(!i)return;
      const v=parseInt(i.value);if(isNaN(v))return;
      answered++;if(v===cur.ans)correct++;
      cur=gen();render();
    };
    render();
    startTimer(75,()=>{
      window.doMath=()=>{};
      nextGame(answered===0?0:(correct/answered)*100,'math');
    });
  }

  // ══ PATTERN RECOGNITION (3 questions) ══
  function initPattern(area) {
    const all=[
      {seq:[2,4,8,16,'?'],ans:32,opts:[24,28,32,36]},
      {seq:[1,4,9,16,'?'],ans:25,opts:[20,25,30,36]},
      {seq:[100,90,81,73,'?'],ans:66,opts:[66,68,70,72]},
      {seq:[3,6,10,15,'?'],ans:21,opts:[18,20,21,24]},
      {seq:[2,3,5,8,13,'?'],ans:21,opts:[18,20,21,24]},
    ];
    const pats=all.sort(()=>Math.random()-.5).slice(0,3);
    let q=0,score=0;
    function render(){
      if(q>=3){nextGame(score/3*100,'pattern');return;}
      const p=pats[q];
      const shuffled=[...p.opts].sort(()=>Math.random()-.5);
      area.innerHTML=`
        <div class="pat-qn">Question ${q+1} of 3</div>
        <div class="pat-seq">${p.seq.map(n=>`<div class="pat-num${n==='?'?' q':''}">${n}</div>`).join('')}</div>
        <div class="pat-opts">${shuffled.map(o=>`<div class="pat-opt" onclick="pickPat(${o},${p.ans},this)">${o}</div>`).join('')}</div>`;
    }
    window.pickPat=function(picked,correct,el){
      clearInterval(timerInterval);
      document.querySelectorAll('.pat-opt').forEach(o=>o.onclick=null);
      if(picked===correct){score++;el.classList.add('ok');}
      else{el.classList.add('no');document.querySelectorAll('.pat-opt').forEach(o=>{if(parseInt(o.textContent)===correct)o.classList.add('ok');});}
      q++;setTimeout(render,900);
    };
    render();
    startTimer(25,()=>{document.querySelectorAll('.pat-opt').forEach(o=>o.onclick=null);q++;setTimeout(render,300);});
  }

  // ══ STROOP TEST (8 rounds) ══
  function initStroop(area) {
    const colors=['Red','Blue','Green','Yellow','Teal'];
    const hex={Red:'#ef4444',Blue:'#3b82f6',Green:'#22c55e',Yellow:'#eab308',Teal:'#14b8a6'};
    let round=0,correct=0,total=8;
    function render(){
      if(round>=total){nextGame(correct/total*100,'stroop');return;}
      const word=colors[Math.floor(Math.random()*colors.length)];
      let ink=colors[Math.floor(Math.random()*colors.length)];
      while(ink===word)ink=colors[Math.floor(Math.random()*colors.length)];
      const shuffled=[...colors].sort(()=>Math.random()-.5);
      area.innerHTML=`
        <div class="stroop-stats">
          <div class="s-stat"><div class="v" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
          <div class="s-stat"><div class="v" style="color:var(--muted)">${round}/${total}</div><div class="l">Progress</div></div>
        </div>
        <div class="s-prog"><div class="s-fill" style="width:${round/total*100}%"></div></div>
        <div class="stroop-instr">Tap the INK COLOUR — ignore what the word says</div>
        <div class="stroop-word" style="color:${hex[ink]}">${word}</div>
        <div class="stroop-q">What colour is the ink?</div>
        <div class="stroop-btns">${shuffled.map(c=>`<button class="s-btn" style="border-color:${hex[c]}25" onclick="pickStroop('${c}','${ink}',this)">${c}</button>`).join('')}</div>`;
    }
    window.pickStroop=function(picked,ink,el){
      document.querySelectorAll('.s-btn').forEach(b=>b.onclick=null);
      if(picked===ink){correct++;el.classList.add('ok');}
      else{el.classList.add('no');document.querySelectorAll('.s-btn').forEach(b=>{if(b.textContent===ink)b.classList.add('ok');});}
      round++;setTimeout(render,550);
    };
    render();
    startTimer(60,()=>{nextGame(correct/total*100,'stroop');});
  }

  // ══ SALES WAR ROOM (25s) ══
  function initWarRoom(area) {
    const scenarios=[
      {months:['Jan','Feb','Mar','Apr'],vals:[420,385,310,210],
       metrics:[{l:'Revenue (Apr)',v:'Rs 2.1M',c:'-32%',d:'dn'},{l:'Units Sold',v:'1,240',c:'-28%',d:'dn'},{l:'Avg Order',v:'Rs 1,693',c:'-5%',d:'dn'}],
       q:'What is the most likely cause and correct action?',
       opts:['Increase ad spend immediately','Check if sunscreen stock ran out — it\'s peak summer','Hire more customer reps','Reduce product prices by 20%'],correct:1},
      {months:['Jan','Feb','Mar','Apr'],vals:[200,310,480,290],
       metrics:[{l:'Revenue (Apr)',v:'Rs 2.9M',c:'-40%',d:'dn'},{l:'New Customers',v:'892',c:'-35%',d:'dn'},{l:'Return Rate',v:'18%',c:'+9%',d:'dn'}],
       q:'Revenue spiked in March then crashed in April. What most likely happened?',
       opts:['A flash sale in March brought one-time buyers who didn\'t return','Delivery partner changed in April','A competitor launched in April','March data is incorrect'],correct:0},
    ];
    const sc=scenarios[Math.floor(Math.random()*scenarios.length)];
    const max=Math.max(...sc.vals);
    const bc=['#6B21A8','#7E3BB5','#ff85c8','#ffb3dc'];
    area.innerHTML=`
      <div class="chart-wrap"><div class="bars">${sc.months.map((m,i)=>`<div class="bar-col"><div class="bar-el" style="height:${Math.round(sc.vals[i]/max*90)}px;background:${bc[i]}"></div><div class="bar-lbl">${m}</div></div>`).join('')}</div></div>
      <div class="war-metrics">${sc.metrics.map(m=>`<div class="wm"><div class="wl">${m.l}</div><div class="wv">${m.v}</div><div class="wc ${m.d}">${m.c}</div></div>`).join('')}</div>
      <div class="war-q">⚠️ ${sc.q}</div>
      <div class="war-opts">${sc.opts.map((o,i)=>`<div class="war-opt" onclick="pickWar(${i},${sc.correct},this)">${o}</div>`).join('')}</div>`;
    startTimer(25,()=>{document.querySelectorAll('.war-opt').forEach(o=>o.onclick=null);nextGame(0,'warroom');});
    window.pickWar=function(picked,correct,el){
      clearInterval(timerInterval);
      document.querySelectorAll('.war-opt').forEach(o=>o.onclick=null);
      if(picked===correct){el.classList.add('ok');nextGame(100,'warroom');}
      else{el.classList.add('no');document.querySelectorAll('.war-opt')[correct].classList.add('ok');setTimeout(()=>nextGame(0,'warroom'),1400);}
    };
