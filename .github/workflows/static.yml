  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .stat-box .sv{font-size:28px;font-weight:800;font-family:'Poppins',sans-serif;color:var(--purple);}
  .stat-box .sl{font-size:11px;color:var(--muted);margin-top:1px;}
  .table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .table-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .table-head h3{font-size:15px;font-weight:700;}
  .btn-export{background:var(--purple);color:#fff;border:none;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;display:flex;align-items:center;gap:5px;}
  .btn-export:hover{background:var(--purple-light);}
  table{width:100%;border-collapse:collapse;font-size:12px;}
