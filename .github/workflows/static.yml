  // ══ INBOX MELTDOWN (45s) ══
  function initInbox(area) {
    const items=[
      {ico:'📸',from:'Instagram',subj:'Negative viral post about Highfy',prev:'A customer posted a reel with 40k views calling out late delivery...',urg:'critical',rank:1},
      {ico:'🚚',from:'Logistics Team',subj:'Supplier delay — flash sale stock',prev:'Our sunscreen order won\'t arrive before the 3pm flash sale...',urg:'critical',rank:2},
      {ico:'⚠️',from:'Tech Team',subj:'Pricing error on sale page',prev:'The flash sale is live with 0% discount instead of 40%...',urg:'high',rank:3},
      {ico:'📩',from:'Influencer Agency',subj:'Partnership proposal — 500K creator',prev:'We have an exciting collab opportunity. Can we schedule a call?',urg:'medium',rank:4},
      {ico:'📊',from:'Finance',subj:'Monthly P&L ready for review',prev:'April numbers are in. Please review at your earliest convenience.',urg:'low',rank:5},
    ];
    let order=[...items].sort(()=>Math.random()-.5);
    let dragSrc=null;
    function render(){
      area.innerHTML=`
        <div class="inbox-instr">Drag to rank: most urgent at top, least urgent at bottom</div>
        <div class="inbox-list" id="ilist">${order.map((item,i)=>`
          <div class="inbox-item" draggable="true" data-i="${i}">
            <div class="inbox-rank">${i+1}</div>
            <div class="inbox-ico">${item.ico}</div>
            <div class="inbox-txt"><div class="from">${item.from}</div><div class="subj">${item.subj}</div><div class="prev">${item.prev}</div></div>
            
          </div>`).join('')}
        </div>
        <button class="btn-confirm" onclick="submitInbox()">Confirm Priority →</button>`;
      setupDrag();
    }
    function setupDrag(){
      document.querySelectorAll('.inbox-item').forEach(el=>{
        el.ondragstart=()=>{dragSrc=el;el.classList.add('dragging');};
        el.ondragend=()=>{el.classList.remove('dragging');document.querySelectorAll('.inbox-item').forEach(e=>e.classList.remove('over'));};
        el.ondragover=e=>{e.preventDefault();el.classList.add('over');};
        el.ondragleave=()=>el.classList.remove('over');
        el.ondrop=e=>{
          e.preventDefault();el.classList.remove('over');
          if(dragSrc&&dragSrc!==el){
            const si=parseInt(dragSrc.dataset.i),di=parseInt(el.dataset.i);
            [order[si],order[di]]=[order[di],order[si]];
            render();
          }
        };
      });
    }
    window.submitInbox=function(){
      clearInterval(timerInterval);
      let correct=0;order.forEach((item,i)=>{if(item.rank===i+1)correct++;});
      nextGame(correct/items.length*100,'inbox');
    };
    render();
    startTimer(60,()=>window.submitInbox());
  }

  // ══ DEAL OR NO DEAL (2 deals, 20s each) ══
  function initDeal(area) {
    const allDeals=[
      {product:'Korean Vitamin C Serum 30ml',cost:1200,retail:2800,fee:280,disc:30},
      {product:'Lattafa Perfume 100ml',cost:2200,retail:5500,fee:550,disc:25},
      {product:'NYX Lipstick Set (5pc)',cost:1800,retail:3600,fee:360,disc:40},
      {product:'COSRX Snail Mucin Toner',cost:900,retail:2100,fee:210,disc:20},
    ];
    const deals=allDeals.sort(()=>Math.random()-.5).slice(0,4);
    let q=0,totalScore=0;
    function render(){
      if(q>=4){nextGame(totalScore/4*100,'deal');return;}
      const d=deals[q];
      const effRetail=d.retail*(1-(d.disc/100));
      const margin=effRetail-d.cost-d.fee;
      const marginPct=Math.round((margin/effRetail)*100);
      const correct=marginPct>15?'accept':marginPct>0?'negotiate':'reject';
      area.innerHTML=`
        <div class="deal-ctr">Deal ${q+1} of 4</div>
        <div class="deal-card">
          <h3>Supplier Pitch — ${d.product}</h3>
          <div class="deal-grid">
            <div class="deal-m"><div class="dl">Cost Price</div><div class="dv">Rs ${d.cost.toLocaleString()}</div></div>
            <div class="deal-m"><div class="dl">Retail Price</div><div class="dv">Rs ${d.retail.toLocaleString()}</div></div>
            <div class="deal-m"><div class="dl">Platform Fee (~10%)</div><div class="dv">Rs ${d.fee.toLocaleString()}</div></div>
            <div class="deal-m"><div class="dl">Proposed Discount</div><div class="dv">${d.disc}%</div><div class="ds">Effective: Rs ${Math.round(effRetail).toLocaleString()}</div></div>
          </div>
        </div>
        <div class="deal-acts">
          <div class="deal-btn accept" onclick="pickDeal('accept','${correct}',this)">✓ Accept</div>
          <div class="deal-btn negotiate" onclick="pickDeal('negotiate','${correct}',this)">⟳ Negotiate</div>
          <div class="deal-btn reject" onclick="pickDeal('reject','${correct}',this)">✗ Reject</div>
        </div>
        <div class="deal-res" id="deal-res"></div>`;
      startTimer(20,()=>{document.querySelectorAll('.deal-btn').forEach(b=>b.onclick=null);q++;setTimeout(render,300);});
    }
    window.pickDeal=function(picked,correct,el){
      clearInterval(timerInterval);
      document.querySelectorAll('.deal-btn').forEach(b=>b.onclick=null);
      const res=document.getElementById('deal-res');
      if(picked===correct){
        totalScore+=100;el.classList.add('ok');
        res.className='deal-res profit';res.style.display='block';res.textContent='✓ Correct call!';
      } else {
        el.classList.add('no');
        document.querySelectorAll('.deal-btn').forEach(b=>{if(b.classList.contains(correct))b.classList.add('ok');});
        res.className='deal-res loss';res.style.display='block';res.textContent=`The right move was to ${correct}.`;
      }
      q++;setTimeout(render,1400);
    };
    render();
  }

  // ══ DM DASH (2 exchanges) ══
  function initDM(area) {
    let brand=75,sat=60;
    const thread=[{from:'customer',text:"I ordered 3 days ago and STILL no update on my order. This is ridiculous. I'm posting about this if I don't hear back NOW."}];
    const steps=[
      {options:[
        {text:"Hi! We're sorry for the delay. Let me check your order right now.",bd:5,sd:15,sc:25},
        {text:"Our delivery partner has been experiencing delays. We apologise.",bd:-5,sd:0,sc:8},
        {text:"Orders take 5-7 business days. Please wait.",bd:-15,sd:-20,sc:0},
      ]},
      {customerMsg:"I've been waiting 5 days! What are you going to do about it?",
       options:[
        {text:"I've escalated this. As an apology, here's 15% off your next order: HIGHFY15 💛",bd:15,sd:25,sc:25},
        {text:"We understand your frustration. The order should arrive soon.",bd:0,sd:5,sc:8},
        {text:"Please DM us your order number.",bd:-10,sd:-10,sc:0},
      ]},
      {customerMsg:"Fine. But I'm telling my followers about this unless Highfy makes it right.",
       options:[
        {text:"We completely understand. Your order is now our top priority — we'll update you within 2 hours. Thank you for giving us the chance to fix this 💛",bd:20,sd:20,sc:25},
        {text:"We're sorry to hear that. We hope you give us another chance.",bd:0,sd:5,sc:8},
        {text:"That is your right as a customer.",bd:-20,sd:-25,sc:0},
      ]},
    ];
    let step=0,totalScore=0;
    function render(){
      if(step>=steps.length){nextGame(Math.min(100,(totalScore/75)*100),'dm');return;}
      const s=steps[step];
      if(s.customerMsg)thread.push({from:'customer',text:s.customerMsg});
      area.innerHTML=`
        <div class="dm-meters">
          <div class="dm-m"><div class="dl"><span>Brand Reputation</span><span>${brand}%</span></div><div class="dm-bar"><div class="dm-fill" style="width:${brand}%;background:var(--purple)"></div></div></div>
          <div class="dm-m"><div class="dl"><span>Customer Satisfaction</span><span>${sat}%</span></div><div class="dm-bar"><div class="dm-fill" style="width:${sat}%;background:var(--success)"></div></div></div>
        </div>
        <div class="dm-thread" id="dmt">${thread.map(m=>`<div class="dm-bub ${m.from==='customer'?'theirs':'ours'}"><div class="dm-av">${m.from==='customer'?'👤':'💅'}</div><div class="dm-txt">${m.text}</div></div>`).join('')}</div>
        <div class="dm-opts">${s.options.map((o,i)=>`<div class="dm-opt" onclick="pickDM(${i},${step})">${o.text}</div>`).join('')}</div>`;
      const t=document.getElementById('dmt');if(t)t.scrollTop=t.scrollHeight;
    }
    window.pickDM=function(picked,si){
      clearInterval(timerInterval);
      const o=steps[si].options[picked];
      totalScore+=o.sc;brand=Math.min(100,Math.max(0,brand+o.bd));sat=Math.min(100,Math.max(0,sat+o.sd));
      thread.push({from:'ours',text:o.text});step++;setTimeout(render,300);
    };
    render();
    startTimer(90,()=>{nextGame(Math.min(100,(totalScore/75)*100),'dm');});
  }

  // ══ FINISH & SAVE ══
  async function finishAssessment() {
    const dim = {
      cognitive:   Math.round((scores.memory+scores.math+scores.pattern+scores.stroop)/4),
      numeracy:    Math.round((scores.math+scores.warroom+scores.deal)/3),
      judgment:    Math.round((scores.inbox+scores.deal+scores.dm)/3),
      situational: Math.round((scores.warroom+scores.inbox+scores.dm)/3),
    };
    const total = Object.values(scores).reduce((a,b)=>a+b,0);
    const tags = [];
    if(dim.cognitive>=70) tags.push('Sharp Thinker');
    if(dim.numeracy>=70)  tags.push('Commercially Literate');
    if(dim.judgment>=70)  tags.push('Sound Judgment');
    if(dim.situational>=70) tags.push('Situationally Aware');
    const profileTitle = total>=600?'Exceptional Performer':total>=400?'Strong Candidate':'Developing Candidate';

    let resumeUrl = null;

    const record = {
      name: candidate.name,
      erp: candidate.erp,
      gpa: candidate.gpa,
      email: candidate.email,
      phone: candidate.phone,
      program: candidate.program,
      resume_data: null,
      score_memory: scores.memory,
      score_math: scores.math,
      score_pattern: scores.pattern,
      score_stroop: scores.stroop,
      score_warroom: scores.warroom,
      score_inbox: scores.inbox,
      score_deal: scores.deal,
      score_dm: scores.dm,
      dim_cognitive: dim.cognitive,
      dim_numeracy: dim.numeracy,
      dim_judgment: dim.judgment,
      dim_situational: dim.situational,
      total_score: total,
      profile: profileTitle,
      tags: tags.join(', '),
      submitted_at: new Date().toISOString(),
    };

    try {
      await db.from(TABLE).update(record).eq('erp', candidate.erp).eq('profile', 'In Progress');
    } catch(e) {
      console.error('Save error:', e);
    }

    showScreen('screen-results');
    document.getElementById('res-name').textContent = candidate.name;
    document.getElementById('res-title').textContent = profileTitle;
    document.getElementById('res-program').textContent = candidate.program;
    document.getElementById('res-total').textContent = total;
    document.getElementById('res-tags').innerHTML = tags.length
      ? tags.map(t=>`<div class="profile-tag">${t}</div>`).join('')
      : '<div class="profile-tag">Keep developing</div>';
    document.getElementById('res-rows').innerHTML = [
      {n:'Cognitive Abilities',v:dim.cognitive},
      {n:'Numerical & Business Literacy',v:dim.numeracy},
      {n:'Judgment & Decision Making',v:dim.judgment},
      {n:'Situational Awareness',v:dim.situational},
    ].map(r=>`<div class="s-row"><div class="sn">${r.n}</div><div class="sbw"><div class="sbf" style="width:${r.v}%"></div></div><div class="sp">${r.v}%</div></div>`).join('');
  }

