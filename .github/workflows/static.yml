        <div class="stat-box"><div class="sv">${intern}</div><div class="sl">Summer Internship</div></div>
        <div class="stat-box"><div class="sv">${avg}</div><div class="sl">Avg Score / 800</div></div>`;
      document.getElementById('admin-tbody').innerHTML = data.map((r,i)=>{
        const cls = r.total_score>=600?'score-hi':r.total_score>=400?'score-mid':'score-lo';
        return `<tr>
          <td>${i+1}</td>
          <td><strong>${r.name}</strong></td>
          <td>${r.erp}</td>
          <td>${r.gpa || '—'}</td>
          <td>${r.email}</td>
          <td>${r.phone}</td>
          <td><span class="badge ${r.program==='MT Program'?'badge-mt':'badge-intern'}">${r.program}</span></td>
          <td><span class="${cls}">${r.total_score}/800</span></td>
          <td>${r.dim_cognitive||0}%</td>
          <td>${r.dim_numeracy||0}%</td>
          <td>${r.dim_judgment||0}%</td>
          <td>${r.dim_situational||0}%</td>
          <td style="color:var(--muted);font-size:10px">${r.submitted_at?new Date(r.submitted_at).toLocaleString():''}</td>
        </tr>`;
      }).join('');
    } catch(e) {
      console.error(e);
      document.getElementById('admin-loading').textContent='Error loading results. Check console.';
    }
  }

  async function exportExcel() {
    try {
      const { data, error } = await db.from(TABLE).select('*').order('submitted_at',{ascending:false});
      if(error) throw error;
      if(!data||!data.length){alert('No results to export yet.');return;}
      const rows = data.map((r,i)=>{
        return {
          'No': i+1,
          'Name': r.name || '',
          'ERP': r.erp || '',
          'Email': r.email || '',
          'Phone': r.phone || '',
          'Program': r.program || '',
          'Total Score': r.total_score || 0,
          'Out of': 800,
          'Cognitive %': r.dim_cognitive || 0,
          'Numeracy %': r.dim_numeracy || 0,
          'Judgment %': r.dim_judgment || 0,
          'Situational %': r.dim_situational || 0,
          'Memory': r.score_memory || 0,
          'Math': r.score_math || 0,
          'Pattern': r.score_pattern || 0,
          'Stroop': r.score_stroop || 0,
          'War Room': r.score_warroom || 0,
          'Inbox': r.score_inbox || 0,
          'Deal': r.score_deal || 0,
          'DM Dash': r.score_dm || 0,
          'Profile': r.profile || '',
          'Tags': r.tags || '',
          'GPA': r.gpa || '',
          'Date': r.submitted_at ? new Date(r.submitted_at).toLocaleString() : '',
        };
      });
      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = Object.keys(rows[0]).map(()=>({wch:20}));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,'Candidates',ws);
      XLSX.writeFile(wb,'Highfy_Results_'+new Date().toISOString().slice(0,10)+'.xlsx');
    } catch(e){ console.error('Export error:',e); alert('Export failed: '+e.message); }
  }
  </script>
  </body>
  </html>
