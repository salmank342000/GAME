  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div class="res-inner fade-in">
      <h1>Assessment Complete 🎉</h1>
      <p>Here's your cognitive profile, <span id="res-name" style="color:var(--purple);font-weight:600"></span>.</p>
      <div class="profile-card">
        <h2 id="res-title"></h2>
        <div class="profile-role" id="res-program"></div>
        <div class="profile-tags" id="res-tags"></div>
        <div class="score-rows" id="res-rows"></div>
        <div class="total-box">
          <div class="tv" id="res-total"></div>
          <div class="tl">out of 800 total points</div>
        </div>
      </div>
      <p class="res-note">Your results have been submitted to the Highfy team. We'll be in touch soon!</p>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="screen-admin" class="screen">
    <div class="admin-top">
      <h1 style="color:#6B21A8;">high<span style="color:#6B21A8;">fy</span><span style="color:#F97316;font-size:13px;"> 👑</span> — Admin</h1>
      <button class="btn-back" onclick="showScreen('screen-landing')">← Back</button>
    </div>
    <div class="admin-body">
      <div id="admin-login-view">
        <div class="admin-login-wrap fade-in">
          <h2>🔐 Admin Access</h2>
          <p>Enter the admin password to view results.</p>
          <input type="password" id="admin-pw" placeholder="Password" onkeydown="if(event.key==='Enter')checkAdmin()">
          <div class="err" id="err-admin" style="display:block;text-align:center;margin-bottom:8px;"></div>
          <button class="btn-main" onclick="checkAdmin()">Unlock Dashboard</button>
        </div>
      </div>
      <div id="admin-dash-view" style="display:none;" class="fade-in">
        <div class="stats-grid" id="admin-stats"></div>
        <div class="table-card">
          <div class="table-head">
            <h3>Candidate Results</h3>
            <button class="btn-export" onclick="exportExcel()">📥 Export to Excel</button>
          </div>
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>#</th><th>Name</th><th>ERP</th><th>GPA</th><th>Email</th><th>Phone</th>
                  <th>Program</th><th>Total</th><th>Cognitive</th><th>Numeracy</th>
                  <th>Judgment</th><th>Situational</th><th>Date</th>
                </tr>
              </thead>
              <tbody id="admin-tbody"></tbody>
            </table>
            <div id="admin-loading" class="loading">Loading results...</div>
            <div id="admin-empty" class="empty" style="display:none">No candidates have completed the assessment yet.</div>
          </div>
        </div>
